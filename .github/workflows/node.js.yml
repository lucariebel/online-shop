name: WebShop24 CI/CD

on:
  push:
    branches: ["main", "ci-cd-test"]
  pull_request:
    branches: ["main", "ci-cd-test"]

jobs:
  build:
    name: Angular Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    steps:
      # {2}
      - name: Checkout the source code
        uses: actions/checkout@v3

      # {3}
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: ./root/frontend-root/package-lock.json

      # {4}
      - name: Install dependencies
        run: npm i
        working-directory: ./root/frontend-root

      # {5}
      - name: Run tests
        run: npm run test --watch=false --browsers=ChromeHeadlessNoSandbox
        working-directory: ./root/frontend-root

      # {6}
      - name: Build
        run: npm run build
        working-directory: ./root/frontend-root

      # {7}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ./root/frontend-root/dist/
          retention-days: 1

  deploy:
    name: Deploy Frontend
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Debug
        run: |
          echo "Current ref: ${{ github.ref }}"
          echo "Event name: ${{ github.event_name }}"

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ./dist # The folder the action should deploy
          branch: gh-pages # The branch the action should deploy to
          clean: true # Automatically remove deleted files from the deploy branch
